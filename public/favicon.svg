<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A192F" />
      <stop offset="100%" stop-color="#122640" />
    </linearGradient>
    
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D1FF" />
      <stop offset="50%" stop-color="#007BFF" />
      <stop offset="100%" stop-color="#6F42C1" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="500" height="500" rx="100" fill="url(#bgGrad)" />

  <g transform="translate(250, 210)">
    <circle r="95" fill="none" stroke="url(#iconGrad)" stroke-width="12" stroke-linecap="round" stroke-dasharray="440 160" transform="rotate(-110)" filter="url(#glow)" />
    
    <g transform="translate(10, 0)">
      <rect x="-35" y="-40" width="85" height="12" rx="6" fill="url(#iconGrad)" />
      <circle cx="-55" cy="-34" r="7" fill="#00D1FF" />
      
      <rect x="-35" y="-10" width="70" height="12" rx="6" fill="#FFFFFF" opacity="0.9" />
      <circle cx="-55" cy="-4" r="7" fill="#007BFF" />
      
      <rect x="-35" y="20" width="95" height="12" rx="6" fill="#FFFFFF" opacity="0.7" />
      <circle cx="-55" cy="26" r="7" fill="#6F42C1" />
    </g>
  </g>

  <text x="250" y="390" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="44" fill="#FFFFFF" letter-spacing="4">RDR</text>
  <text x="250" y="425" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="14" fill="#A8D5FF" letter-spacing="6">DAILY PLANNER</text>
</svg>
