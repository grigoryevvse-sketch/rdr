<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <title>Reminder list circle logo</title>
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061a2d"/>
      <stop offset="1" stop-color="#101a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="118" y1="122" x2="394" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset=".52" stop-color="#2f8cff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="164" stroke="url(#accent)" stroke-width="34" filter="url(#glow)"/>

  <g filter="url(#glow)">
    <circle cx="177" cy="205" r="18" fill="#22d3ee"/>
    <circle cx="177" cy="256" r="18" fill="#2f8cff"/>
    <circle cx="177" cy="307" r="18" fill="#8b5cf6"/>
  </g>

  <g stroke-linecap="round" stroke-width="23">
    <path d="M224 205h118" stroke="#22d3ee"/>
    <path d="M224 256h118" stroke="#2f8cff"/>
    <path d="M224 307h118" stroke="#8b5cf6"/>
  </g>
</svg>
